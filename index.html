<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>Layer-X</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    @font-face {
      font-family: 'Vazir';
      src: url('https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font/dist/Vazir.woff2') format('woff2');
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Vazir', sans-serif;
      background: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQF4F_obBx9jbexEBwWcVBmLauAtUePwGHx8SA9aFnXLw&s=10') no-repeat center center fixed;
      background-size: cover;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
    }

    .card {
      position: relative;
      width: 90%;
      max-width: 420px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(14px);
      padding: 32px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      animation: fadeIn 1s ease;
      z-index: 2;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      text-align: center;
      font-size: 32px;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 25px;
    }

    .links a {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
      padding: 14px 18px;
      border-radius: 12px;
      text-decoration: none;
      background: rgba(30,41,59,0.8);
      color: #e2e8f0;
      transition: 0.25s;
      font-size: 16px;
    }

    .links a:hover {
      background: rgba(51,65,85,0.9);
      transform: translateY(-3px);
    }

    .shop {
      background: #10b981 !important;
      color: #022c22 !important;
      font-weight: bold;
    }

    .shop:hover {
      background: #059669 !important;
    }

    .icon {
      width: 22px;
      height: 22px;
    }
  </style>
</head>

<body>
  <div class="overlay"></div>

  <div class="card">
    <h1>Layer‑X</h1>
    <p class="subtitle">Official Links</p>

    <div class="links">
      <a href="https://instagram.com/layer_x_ir" target="_blank">
        <img class="icon" src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
        اینستاگرام
      </a>

      <a href="https://t.me/layer_x_ir" target="_blank">
        <img class="icon" src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
        تلگرام
      </a>

      <a class="shop" href="https://shop.layer-x.ir" target="_blank">
        🛒 ورود به فروشگاه
      </a>
    </div>
  </div>
</body>
</html>
