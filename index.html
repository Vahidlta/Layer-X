<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>Layer-X</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      max-width: 420px;
      width: 100%;
      padding: 24px;
      border-radius: 16px;
      background: #111827;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    h1 {
      text-align: center;
      margin-bottom: 16px;
    }
    .links a {
      display: block;
      margin: 8px 0;
      padding: 10px 14px;
      border-radius: 999px;
      text-decoration: none;
      background: #1f2937;
      color: #e5e7eb;
      text-align: center;
      transition: background 0.2s;
    }
    .links a:hover {
      background: #374151;
    }
    .shop {
      background: #10b981;
      color: #022c22;
      font-weight: bold;
    }
    .shop:hover {
      background: #059669;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Layer-X</h1>
    <p style="text-align:center;">لینک‌های من</p>
    <div class="links">
      <a href="https://instagram.com/..." target="_blank">اینستاگرام</a>
      <a href="https://t.me/..." target="_blank">تلگرام</a>
      <a href="https://x.com/..." target="_blank">X (توییتر)</a>
      <a class="shop" href="https://shop.layer-x.ir" target="_blank">ورود به فروشگاه</a>
    </div>
  </div>
</body>
</html>
